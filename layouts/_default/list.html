{{ define "main" }}
<div class="container py-5">
  <h1 class="fw-bold mb-5 text-body">Latest Articles</h1>
  <div class="row row-cols-1 row-cols-md-3 g-4">
    {{ range .Paginator.Pages }}
      <div class="col">
        <div class="card h-100 shadow-sm border-0">
          {{ if .Params.thumbnail }}
            <img src="{{ .Params.thumbnail | absURL }}" class="card-img-top" alt="{{ .Title }}" style="height: 220px; object-fit: cover;">
          {{ end }}
          <div class="card-body">
            <h3 class="card-title h5 mb-3">
              <a href="{{ .RelPermalink }}" class="text-decoration-none text-body fw-bold stretched-link">{{ .Title }}</a>
            </h3>
            <p class="card-text text-body-secondary" style="font-size: 0.95rem;">{{ .Summary | plainify | truncate 120 }}</p>
          </div>
          <div class="card-footer bg-transparent border-0 pb-3">
            <small class="text-body-tertiary fw-semibold">{{ .Date.Format "January 2, 2006" }}</small>
          </div>
        </div>
      </div>
    {{ end }}
  </div>
  <div class="mt-5 d-flex justify-content-center">
    {{ template "_internal/pagination.html" . }}
  </div>
</div>
{{ end }}
