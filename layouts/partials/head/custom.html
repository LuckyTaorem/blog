{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description | default "The Future of Tech, Curated Daily" }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ .Site.BaseURL }}search/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{ end }}

{{ if .IsPage }}
{{ $iso8601 := "2006-01-02T15:04:05-07:00" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "headline": "{{ .Title | plainify | htmlEscape }}",
  "description": "{{ with .Description }}{{ . | plainify | htmlEscape }}{{ else }}{{ .Summary | plainify | htmlEscape }}{{ end }}",
  "image": [
    {{ if .Params.thumbnail }}
      "{{ .Params.thumbnail | absURL }}"
    {{ else if .Params.images }}
      "{{ index .Params.images 0 | absURL }}"
    {{ else }}
      "{{ "img/logo-2800x867.png" | absURL }}"
    {{ end }}
  ],
  "datePublished": "{{ .Date.Format $iso8601 }}",
  "dateModified": "{{ if .Lastmod }}{{ .Lastmod.Format $iso8601 }}{{ else }}{{ .Date.Format $iso8601 }}{{ end }}",
  "author": {
    "@type": "Person",
    "name": "Lucky Taorem",
    "url": "https://luckytaorem.github.io",
    "jobTitle": "WordPress and PHP Developer"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ "img/logo-2800x867.png" | absURL }}"
    }
  }
}
</script>
{{ end }}
