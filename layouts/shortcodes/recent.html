<div class="row row-cols-1 row-cols-md-2 g-4 mt-4">
  {{ range first 6 (where site.RegularPages "Section" "posts") }}
    <div class="col">
      <div class="card h-100 shadow-sm border-0 bg-light">
        <div class="card-body">
          <h3 class="card-title h5 mb-3">
            <a href="{{ .RelPermalink }}" class="text-decoration-none text-dark fw-bold stretched-link">
              {{ .Title }}
            </a>
          </h3>
          <p class="card-text text-secondary" style="font-size: 0.95rem;">
            {{ .Summary | plainify | truncate 120 }}
          </p>
        </div>
        <div class="card-footer bg-transparent border-0 pb-3">
          <small class="text-muted fw-semibold">
            {{ .Date.Format "January 2, 2006" }}
          </small>
        </div>
      </div>
    </div>
  {{ end }}
</div>

<div class="mt-5 mb-3 text-center">
  <a href="/blog/posts/" class="btn btn-primary px-4 py-2 rounded-pill fw-bold">View All Articles</a>
</div>
