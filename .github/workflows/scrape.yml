name: 1. RSS Scraper Queue

on:
  schedule:
    # Runs at 2:30 UTC (8:00 AM IST) and 14:30 UTC (8:00 PM IST)
    - cron: '30 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install feedparser pillow requests
      - name: Run Scraper
        run: python generate_post.py --scrape