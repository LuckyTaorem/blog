name: 1. RSS Scraper Queue

on:
  schedule:
    # Runs once at 14:30 UTC (8:00 PM IST)
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      # FIX: We now tell GitHub to look at requirements.txt instead of a hardcoded list!
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🚀 NEW: Check queue depth before scraping
      - name: Check Queue Depth
        id: queue_check
        run: |
          if [ -f "queue.json" ]; then
            # Count elements in the JSON array
            COUNT=$(jq '. | length' queue.json)
            echo "📊 Current pending articles in queue: $COUNT"
            
            if [ "$COUNT" -gt 10 ]; then
              echo "⚠️ Queue depth ($COUNT) exceeds the threshold of 10. Skipping run."
              echo "skip_scraper=true" >> $GITHUB_OUTPUT
            else
              echo "✅ Queue depth ($COUNT) is safe. Proceeding."
              echo "skip_scraper=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "ℹ️ queue.json not found. Proceeding with fresh file creation."
            echo "skip_scraper=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run Scraper
        if: steps.queue_check.outputs.skip_scraper != 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python generate_post.py --scrape
