name: Deploy Hinode site to Public Repo
timeZone: "Asia/Kolkata"

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 🚨 ADDED THIS LINE: Creates the folder so GitHub doesn't panic if it's empty
      - name: Create Resources Folder
        run: mkdir -p resources

      - name: Cache Hugo Resources
        uses: actions/cache@v4
        with:
          path: resources
          key: ${{ runner.os }}-hugo-resources-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-
      
      - name: Cache Hugo Modules
        uses: actions/cache@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install npm dependencies
        run: npm install

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --gc --minify --baseURL "https://luckytaorem.github.io/blog/" --logLevel error

      - name: Deploy to Public Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: luckytaorem/blog
          publish_branch: main
          publish_dir: ./public
          keep_files: false