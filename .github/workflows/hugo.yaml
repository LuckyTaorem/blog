name: Deploy Hinode site to Public Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Hinode relies on Go modules

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Hinode requires Node.js to build CSS/JS

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install npm dependencies
        run: npm install

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --gc --minify --baseURL "https://luckytaorem.github.io/blog/"

      - name: Deploy to Public Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: luckytaorem/blog
          publish_branch: main
          publish_dir: ./public
          keep_files: false

      - name: Wait for GitHub Pages to Deploy
        run: |
          echo "Waiting 90 seconds for GitHub Pages to process the HTML..."
          sleep 90

      - name: Setup Python for Broadcasting
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install feedparser groq pillow requests atproto pytumblr google-auth google-auth-httplib2

      - name: Broadcast to Social Media
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TUMBLR_KEY: ${{ secrets.TUMBLR_KEY }}
          TUMBLR_SECRET: ${{ secrets.TUMBLR_SECRET }}
          TUMBLR_OAUTH: ${{ secrets.TUMBLR_OAUTH }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          GCP_INDEXING_JSON: ${{ secrets.GCP_INDEXING_JSON }}
        run: python generate_post.py --broadcast
