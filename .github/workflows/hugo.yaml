name: Deploy Hinode site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

# 🚀 UPDATED PERMISSIONS FOR DIRECT DEPLOYMENT
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      HUGO_CACHEDIR: /tmp/hugo_cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' # 🚀 NPM CACHE RESTORED

      - name: Cache Hugo Modules # 🚀 HUGO MODULE CACHE RESTORED
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Cache Hugo Modules 
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          # 🚀 FIX 1: Updated key to bust the broken cache
          key: ${{ runner.os }}-hugomod-v3-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Cache Hugo Resources 
        uses: actions/cache@v4
        with:
          path: resources
          # 🚀 FIX 1: Updated key to bust the broken cache
          key: ${{ runner.os }}-hugo-resources-v3-${{ hashFiles('**/hugo.toml', '**/config.toml', '**/package-lock.json', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Dart Sass (1.101.0)
        run: |
          # 1. Download the specific version
          wget https://github.com/sass/dart-sass/releases/download/1.101.0/dart-sass-1.101.0-linux-x64.tar.gz
          
          # 2. Extract it
          tar -xvf dart-sass-1.101.0-linux-x64.tar.gz
          
          # 🚀 FIX 2: DO NOT rename it. Hugo looks for the exact name 'sass'
          # 3. Add to PATH
          echo "$(pwd)/dart-sass" >> $GITHUB_PATH

      - name: Purge Broken Cache
        # 🚀 FIX 3: Manually wipe any lingering corrupted files before building
        run: rm -rf /tmp/hugo_cache/modules/filecache

      - name: Install npm dependencies
        run: npm install

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo -F --gc --minify --baseURL "https://ltdeveloperblogs.github.io/" --logLevel error

        # 🚀 THE FIX: Use standard Git push instead of GitHub's broken API
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: ltdeveloperblogs/ltdeveloperblogs.github.io
          publish_branch: main
          publish_dir: ./public
          keep_files: false
      
      # --- BROADCAST STEPS REMAIN UNCHANGED ---
      - name: Setup Python for Broadcast
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smart Wait for GitHub Pages (Prevent 404s)
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          
          if [[ "$COMMIT_MSG" != *"Published article batch"* ]]; then
            echo "Not an automated article batch. Skipping wait."
            exit 0
          fi
          
          echo "⏳ Automated posts detected! Waiting 75 seconds for GitHub Pages deployment to propagate..."
          sleep 75

      - name: Broadcast to Social Media
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GCP_INDEXING_JSON: ${{ secrets.GCP_INDEXING_JSON }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TUMBLR_KEY: ${{ secrets.TUMBLR_KEY }}
          TUMBLR_SECRET: ${{ secrets.TUMBLR_SECRET }}
          TUMBLR_OAUTH: ${{ secrets.TUMBLR_OAUTH }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_URN: ${{ secrets.LINKEDIN_URN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_SECRET: ${{ secrets.REDDIT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Last commit message was: $COMMIT_MSG"
          
          if [[ "$COMMIT_MSG" == *"Published article batch"* ]]; then
            echo "📣 Automated post detected via commit message! Launching dynamic broadcast..."
            # Use the emergency broadcaster to scan for recent .md files instead of the json queue
            python generate_post.py --force-recent
          else
            echo "✅ Standard code push. Skipping broadcast to prevent duplicates."
          fi