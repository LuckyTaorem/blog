name: Daily AI Tech Blogger

on:
  schedule:
    - cron: '0 8 * * *' # Runs automatically every day at 8:00 AM UTC
  workflow_dispatch: # Allows you to trigger it manually via a button

jobs:
  write_and_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # We install feedparser for the RSS feed, and the Groq library
      - name: Install Dependencies
        run: pip install feedparser groq

      - name: Run Groq AI Writer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_post.py

      - name: Commit and Push New Article
        run: |
          git config --global user.name "AI Automation Bot"
          git config --global user.email "actions@github.com"
          git add content/posts/*
          git commit -m "Auto-published new tech article via Groq" || exit 0
          git push