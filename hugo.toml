title = "Lucky Taorem | Tech & AI Blog"
baseURL = "https://luckytaorem.github.io/blog/"

[params]
  description = "Expert analysis, tutorials, and news on Artificial Intelligence, Web Development, and Technology by Lucky Taorem."
  
  # 🚨 THIS KILLS THE HINODE LOGO IN SEO EXTENSIONS 🚨
  # Hugo will look in your assets/ or static/ folder for this exact path
  images = ["img/logo.png"]

timeZone = "Asia/Kolkata"


# 2. This tells Hugo to automatically generate a robots.txt file
enableRobotsTXT = true

# 3. Optional: Ensures your URLs are clean (no ugly .html at the end)
uglyURLs = false

locale = "en-us"

[module]
  [[module.imports]]
    path = "github.com/gethinode/hinode"

[params.main]
  endorse = false

[params.footer]
  copyright = "© 2026 LT Developer. All rights reserved."

[params.navigation]
  logo = "img/logo.png"

[params.author]
  name = "Lucky Taorem"
  image = "images/lucky.jpg"

[params.publisher]
  name = "Lucky Taorem"
  logo = "images/lucky.jpg"

# This forces Hinode to output rich SEO metadata for social graphs
[params.seo]
  twitter = "taorem_lucky"


# --- TOP NAVIGATION MENU ---
[[menus.main]]
  name = "Home"
  pageRef = "/"
  weight = 10

[[menus.main]]
  name = "Articles"
  pageRef = "/posts"
  weight = 20

[[menus.main]]
  name = "About Us"
  pageRef = "/about"
  weight = 30

[[menus.main]]
  name = "Contact"
  pageRef = "/contact"
  weight = 40

# --- FOOTER MENU ---
[[menus.footer]]
  name = "About Us"
  pageRef = "/about"
  weight = 10

[[menus.footer]]
  name = "Contact Us"
  pageRef = "/contact"
  weight = 20

[[menus.footer]]
    name = "Privacy Policy"
    url = "/privacy/"
    weight = 30

[[menus.footer]]
    name = "Terms and Conditions"
    url = "/terms-and-conditions/"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true