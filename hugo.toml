title = "Lucky Taorem | Tech & AI Blog"
baseURL = "https://ltdeveloperblogs.github.io/"

[params]
  description = "Expert analysis, tutorials, and news on Artificial Intelligence, Web Development, and Technology by Lucky Taorem."
  # 🚨 Removed the 'images' array from here so Hinode's engine doesn't crash!

timeZone = "Asia/Kolkata"
enableRobotsTXT = true
uglyURLs = false
locale = "en-us"

[module]
  [[module.imports]]
    path = "github.com/gethinode/hinode"

[params.main]
  endorse = false

[params.footer]
  copyright = "© 2026 LT Developer. All rights reserved."

[params.navigation]
  logo = "img/logo.png"

[params.author]
  name = "Lucky Taorem"
  image = "images/lucky.jpg"

[params.publisher]
  name = "Lucky Taorem"
  logo = "img/logo.png"

[params.seo]
  twitter = "taorem_lucky"
  # 🚨 THIS is the correct, safe place to define your global fallback SEO logo in Hinode
  image = "images/og-image.jpg

# --- DISABLE ANALYTICS & PREVENT ADBLOCKER ERRORS ---

# 1. Disable Hugo's internal Google Analytics engine
[privacy]
  [privacy.googleAnalytics]
    disable = true

# 2. Disable Hinode's specific Analytics module bundler
[params.modules.analytics]
  disable = true

[params.flexsearch]
  lazyLoad = true

[params.modules.flexsearch]
  lazyLoad = true

[params.modules.fontawesome]
  disable = true

# --- TOP NAVIGATION MENU ---
[[menus.main]]
  name = "Home"
  pageRef = "/"
  weight = 10

[[menus.main]]
  name = "Articles"
  pageRef = "/posts"
  weight = 20

[[menus.main]]
  name = "About Us"
  pageRef = "/about"
  weight = 30

[[menus.main]]
  name = "Contact"
  pageRef = "/contact"
  weight = 40

# --- FOOTER MENU ---
[[menus.footer]]
  name = "About Us"
  pageRef = "/about"
  weight = 10

[[menus.footer]]
  name = "Contact Us"
  pageRef = "/contact"
  weight = 20

[[menus.footer]]
    name = "Privacy Policy"
    url = "/privacy/"
    weight = 30

[[menus.footer]]
    name = "Terms and Conditions"
    url = "/terms-and-conditions/"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[build]
  [build.options]
    transpiler = "dartsass"
    target = "es2020"

[minify]
  disableCSS = false
  disableJS = false
  minifyOutput = true

[caches]
  assets = { dir = ":resourceDir/_gen", maxAge = "720h" }

# 1. Disable Hugo's default single sitemap
disableKinds = ["sitemap"]

# 2. Define XML as a valid media type
[mediaTypes]
  [mediaTypes."application/xml"]
    suffixes = ["xml"]

# 3. Create the custom output formats for our split sitemaps
[outputFormats]
  [outputFormats.SitemapIndex]
    mediaType = "application/xml"
    baseName = "sitemap_index"
    isPlainText = true

  [outputFormats.SitemapLegacy]
    mediaType = "application/xml"
    baseName = "sitemap"
    isPlainText = true
    
  [outputFormats.SitemapPosts]
    mediaType = "application/xml"
    baseName = "post-sitemap"
    isPlainText = true
  [outputFormats.SitemapPages]
    mediaType = "application/xml"
    baseName = "page-sitemap"
    isPlainText = true
  [outputFormats.SitemapCategories]
    mediaType = "application/xml"
    baseName = "category-sitemap"
    isPlainText = true
  [outputFormats.SitemapTags]
    mediaType = "application/xml"
    baseName = "tag-sitemap"
    isPlainText = true

# 4. Assign these to generate on the Homepage (root directory)
[outputs]
  home = ["HTML", "RSS", "SitemapIndex", "SitemapLegacy", "SitemapPosts", "SitemapPages", "SitemapCategories", "SitemapTags"]